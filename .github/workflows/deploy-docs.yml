name: Deploy Documentation

on:
  push:
    branches:
      - master
    paths:
      - 'doc/**'
      - 'mkdocs.yml'
      - 'examples/**'
      - 'mapie/**'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'doc/**'
      - 'mkdocs.yml'
      - 'examples/**'
      - 'pyproject.toml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install dependencies
        run: |
          pip install -e ".[docs]"
          echo "--- Installed mkdocstrings versions ---"
          pip show mkdocstrings mkdocstrings-python

      - name: Restore gallery cache
        uses: actions/cache@v4
        with:
          path: |
            doc/generated
          key: ${{ runner.os }}-docs-gallery-${{ hashFiles('examples/**', 'mapie/**', 'mkdocs.yml', 'pyproject.toml', 'doc/hooks/**') }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build documentation
        run: mkdocs build --strict

      - name: Deploy latest (master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          mike deploy --push --update-aliases latest

      - name: Deploy stable (release)
        if: github.event_name == 'release'
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mike deploy --push --update-aliases "$VERSION" stable
          mike set-default --push stable

      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: site/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
