name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Git clone
        uses: actions/checkout@v4.3.0
      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.13"
          check-latest: true
      - name: Install project with development extras
        run: python -m pip install -e '.[dev]'
      - name: Check linting
        run: make lint
      - name: Check format
        run: make format
      - name: Check static typing
        run: make type-check

  tests:
    name: Tests (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # minimum supported dependencies
          - name: minimum-supported
            os: self-hosted-ubuntu
            python-version: "3.9"
            use-pinned-deps: true
            numpy-version: "==1.24.1"
            sklearn-version: "==1.4.*"
            scipy-version: "==1.10.*"
            run-long-tests: true
          # latest supported environments
          - name: ubuntu-latest
            os: ubuntu-latest
            python-version: "3.13"
            use-pinned-deps: false
            run-long-tests: true
          - name: windows-latest
            os: windows-latest
            python-version: "3.13"
            use-pinned-deps: false
            run-long-tests: false
          - name: macos-latest
            os: macos-latest
            python-version: "3.13"
            use-pinned-deps: false
            run-long-tests: false
    defaults:
      run:
        shell: bash

    steps:
      - name: Git clone
        uses: actions/checkout@v4.3.0
      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true
      - name: Install minimum dependency constraints
        if: ${{ matrix.use-pinned-deps }}
        run: |
          python -m pip install "numpy${{ matrix.numpy-version }}" "scikit-learn${{ matrix.sklearn-version }}" "scipy${{ matrix.scipy-version }}"
      - name: Install project with development extras
        run: python -m pip install -e '.[dev]'
      - name: Test and coverage with pytest
        run: make coverage
      - name: Long tests with pytest
        if: matrix.run-long-tests && (github.event_name == 'push' || !github.event.pull_request.draft)
        run: make long-tests
